
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuerzas Militares - Sistema de Registro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --army-green: #4b5320;
            --army-dark: #2e3312;
            --army-gold: #c5a059;
        }
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .military-header {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://www.ejercito.mil.co/recursos_user/imagenes/ejercito/logo_ejercito.png');
            background-color: var(--army-green);
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }
        .canvas-container {
            border: 2px dashed var(--army-green);
            background: white;
            touch-action: none;
        }
        .btn-military {
            background-color: var(--army-green);
            transition: all 0.3s;
        }
        .btn-military:hover {
            background-color: var(--army-dark);
            transform: translateY(-1px);
        }
        #photo-preview {
            width: 150px;
            height: 180px;
            object-fit: cover;
            border: 3px solid var(--army-gold);
            display: none;
        }
    </style>
</head>
<body class="pb-10">

    <!-- Encabezado Institucional -->
    <header class="military-header text-white p-6 text-center shadow-lg border-b-4 border-[#c5a059]">
        <h1 class="text-2xl font-bold uppercase tracking-widest">Fuerzas Militares de Colombia</h1>
        <p class="text-sm opacity-80">Sistema de Registro y Caracterización de Personal</p>
    </header>

    <main class="max-w-md mx-auto mt-6 bg-white p-6 shadow-xl rounded-lg border-t-4 border-green-900">
        <form id="militaryForm" class="space-y-4">
            
            <!-- Sección de Foto -->
            <div class="flex flex-col items-center space-y-3 mb-6">
                <div id="photo-placeholder" class="w-32 h-40 bg-gray-200 flex items-center justify-center border-2 border-gray-300 rounded">
                    <span class="text-gray-400 text-xs text-center p-2">FOTO DEL PERSONAL</span>
                </div>
                <img id="photo-preview" src="" alt="Vista previa">
                <label class="cursor-pointer bg-gray-800 text-white px-4 py-2 rounded text-sm font-bold uppercase hover:bg-gray-700">
                    📷 Seleccionar Foto / Galería
                    <input type="file" id="photoInput" accept="image/*" class="hidden">
                </label>
            </div>

            <!-- Datos Personales -->
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase">Nombres y Apellidos Completos</label>
                <input type="text" id="nombre" required class="w-full border-b-2 border-gray-300 p-2 focus:border-green-800 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Cédula de Ciudadanía</label>
                    <input type="number" id="cedula" required class="w-full border-b-2 border-gray-300 p-2 focus:border-green-800 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 uppercase">Grupo Sanguíneo</label>
                    <select id="rh" class="w-full border-b-2 border-gray-300 p-2 focus:border-green-800 outline-none bg-transparent">
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase">Grado Militar</label>
                <select id="grado" class="w-full border-b-2 border-gray-300 p-2 focus:border-green-800 outline-none bg-transparent">
                    <option value="Soldado">Soldado</option>
                    <option value="Cabo">Cabo</option>
                    <option value="Sargento">Sargento</option>
                    <option value="Subteniente">Subteniente</option>
                    <option value="Teniente">Teniente</option>
                    <option value="Capitán">Capitán</option>
                    <option value="Mayor">Mayor</option>
                    <option value="Coronel">Coronel</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase">Unidad Militar / Destacamento</label>
                <input type="text" id="unidad" required placeholder="Ej: Batallón de Infantería N.1" class="w-full border-b-2 border-gray-300 p-2 focus:border-green-800 outline-none">
            </div>

            <!-- Panel de Firma -->
            <div class="mt-6">
                <label class="block text-xs font-bold text-gray-700 uppercase mb-2 text-center">Firma Digital del Personal</label>
                <canvas id="signatureCanvas" class="canvas-container w-full h-40 rounded"></canvas>
                <button type="button" id="clearBtn" class="text-[10px] text-red-600 uppercase font-bold mt-1 underline">Limpiar Firma</button>
            </div>

            <!-- Botón de Envío -->
            <button type="submit" class="btn-military w-full text-white font-bold py-4 rounded-lg shadow-lg uppercase tracking-widest mt-6">
                Registrar Personal en Sistema
            </button>
        </form>
    </main>

    <footer class="mt-6 text-center text-gray-500 text-[10px] px-4">
        SISTEMA DE INFORMACIÓN DE PERSONAL (SIPER) <br>
        © 2024 FUERZAS MILITARES DE COLOMBIA - RESERVADO
    </footer>

    <script>
        // Manejo de la Foto
        const photoInput = document.getElementById('photoInput');
        const photoPreview = document.getElementById('photoPreview');
        const photoPlaceholder = document.getElementById('photoPlaceholder');

        photoInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photoPreview.src = e.target.result;
                    photoPreview.style.display = 'block';
                    photoPlaceholder.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        // Manejo de la Firma (Canvas)
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clearBtn');
        let drawing = false;

        // Ajustar tamaño del canvas al contenedor
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('load', resizeCanvas);

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startPosition(e) {
            drawing = true;
            draw(e);
        }

        function endPosition() {
            drawing = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!drawing) return;
            e.preventDefault();
            const pos = getPos(e);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('touchstart', startPosition);
        canvas.addEventListener('touchend', endPosition);
        canvas.addEventListener('touchmove', draw);

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Simulación de Envío
        document.getElementById('militaryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Aquí puedes integrar el bot de Telegram más adelante
            alert("SISTEMA: Personal " + document.getElementById('nombre').value + " registrado con éxito en la base de datos central.");
            
            // Opcional: Limpiar formulario
            // this.reset();
            // ctx.clearRect(0, 0, canvas.width, canvas.height);
        });
    </script>
</body>
</html>
